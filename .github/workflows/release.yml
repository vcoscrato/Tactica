name: Release and Publish AUR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      version: ${{ steps.bundle.outputs.version }}
      sha256: ${{ steps.bundle.outputs.sha256 }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            desktop-file-utils \
            pkg-config
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download Stockfish engine
        run: ./download-stockfish.sh

      - name: Test and build release
        run: |
          cargo test --locked
          cargo build --release --locked

      - name: Create release bundle
        id: bundle
        run: |
          set -u

          rev_count=$(git rev-list --count HEAD)
          short_hash=$(git rev-parse --short HEAD)
          version="r${rev_count}.${short_hash}"

          dist_dir="${RUNNER_TEMP}/tactica-dist"
          install -d "${dist_dir}"

          install -m 0755 target/release/tactica \
            "${dist_dir}/tactica-linux-x86_64"
          install -m 0644 packaging/linux/tactica.desktop \
            "${dist_dir}/tactica.desktop"
          install -m 0644 assets/tactica.svg "${dist_dir}/tactica.svg"
          install -m 0644 LICENSE "${dist_dir}/LICENSE"
          if [ -d legal ]; then
            cp -r legal "${dist_dir}/legal"
          fi

          tarball="tactica-${version}-x86_64.tar.gz"
          tar -czf "${tarball}" -C "${dist_dir}" .
          sha256=$(sha256sum "${tarball}" | cut -d' ' -f1)

          {
            printf 'version=%s\n' "${version}"
            printf 'tarball=%s\n' "${tarball}"
            printf 'sha256=%s\n' "${sha256}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bundle.outputs.version }}
          name: Release ${{ steps.bundle.outputs.version }}
          files: ${{ steps.bundle.outputs.tarball }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published release asset
        env:
          VERSION: ${{ steps.bundle.outputs.version }}
          TARBALL: ${{ steps.bundle.outputs.tarball }}
          SHA256: ${{ steps.bundle.outputs.sha256 }}
        run: |
          set -u

          asset_path="${RUNNER_TEMP}/${TARBALL}"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/${TARBALL}"
          curl --fail --location --retry 5 --retry-all-errors \
            --output "${asset_path}" "${asset_url}"
          printf '%s  %s\n' "${SHA256}" "${asset_path}" | sha256sum --check

  publish-aur:
    name: Publish AUR
    needs: release
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out package template
        uses: actions/checkout@v7

      - name: Configure AUR SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -u

          if [ -z "${AUR_SSH_PRIVATE_KEY}" ]; then
            echo "::error::AUR_SSH_PRIVATE_KEY is not configured."
            exit 1
          fi

          install -d -m 0700 "${HOME}/.ssh"
          key_file="${HOME}/.ssh/id_aur"
          key_value=${AUR_SSH_PRIVATE_KEY//$'\r'/}

          printf '%s\n' "${key_value}" > "${key_file}"
          chmod 0600 "${key_file}"

          if ! ssh-keygen -y -f "${key_file}" > /dev/null 2>&1; then
            printf '%b\n' "${key_value}" > "${key_file}"
          fi

          if ! ssh-keygen -y -f "${key_file}" > /dev/null 2>&1; then
            decoded_key="${RUNNER_TEMP}/aur_key_decoded"
            if printf '%s' "${key_value}" |
              base64 --decode > "${decoded_key}" 2>/dev/null; then
              install -m 0600 "${decoded_key}" "${key_file}"
            fi
          fi

          if ! ssh-keygen -y -f "${key_file}" > /dev/null 2>&1; then
            echo "::error::AUR_SSH_PRIVATE_KEY is not a valid raw, escaped-newline, or base64-encoded private key."
            exit 1
          fi

          ssh-keyscan -H aur.archlinux.org >> "${HOME}/.ssh/known_hosts"

      - name: Clone AUR repository
        run: |
          set -u

          aur_dir="${RUNNER_TEMP}/tactica-bin-aur"
          git clone --branch master --single-branch \
            https://aur.archlinux.org/tactica-bin.git "${aur_dir}"
          git -C "${aur_dir}" remote set-url --push origin \
            ssh://aur@aur.archlinux.org/tactica-bin.git
          chmod 0755 "${aur_dir}"

      - name: Render PKGBUILD
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256: ${{ needs.release.outputs.sha256 }}
        run: |
          set -u

          aur_dir="${RUNNER_TEMP}/tactica-bin-aur"
          install -m 0644 packaging/aur/PKGBUILD.template \
            "${aur_dir}/PKGBUILD"
          sed -i "s/__VERSION__/${VERSION}/g" "${aur_dir}/PKGBUILD"
          sed -i "s/__SHA256__/${SHA256}/g" "${aur_dir}/PKGBUILD"
          if grep -Eq '__[A-Z0-9_]+__' "${aur_dir}/PKGBUILD"; then
            echo "::error::Unresolved placeholder in rendered PKGBUILD."
            exit 1
          fi

      - name: Generate and validate .SRCINFO
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256: ${{ needs.release.outputs.sha256 }}
        run: |
          set -u

          aur_dir="${RUNNER_TEMP}/tactica-bin-aur"
          docker run --rm \
            --user 65534:65534 \
            --env HOME=/tmp \
            --env BUILDDIR=/tmp/makepkg \
            --env PKGDEST=/tmp \
            --env SRCDEST=/tmp \
            --env SRCPKGDEST=/tmp \
            --env LOGDEST=/tmp \
            --volume "${aur_dir}:/pkg:ro" \
            --workdir /pkg \
            archlinux:latest \
            makepkg --printsrcinfo > "${aur_dir}/.SRCINFO"
          test -s "${aur_dir}/.SRCINFO"
          grep -Fqx $'\tpkgver = '"${VERSION}" "${aur_dir}/.SRCINFO"
          if grep -Fq $'\tepoch = ' "${aur_dir}/.SRCINFO"; then
            echo "::error::AUR package version must not use an epoch."
            exit 1
          fi
          grep -Fqx $'\tsha256sums = '"${SHA256}" "${aur_dir}/.SRCINFO"

      - name: Commit and push AUR update
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -u

          aur_dir="${RUNNER_TEMP}/tactica-bin-aur"
          git -C "${aur_dir}" config user.name "github-actions[bot]"
          git -C "${aur_dir}" config user.email \
            "github-actions[bot]@users.noreply.github.com"
          git -C "${aur_dir}" add PKGBUILD .SRCINFO
          if git -C "${aur_dir}" diff --cached --quiet; then
            echo "AUR already contains ${VERSION}."
          else
            git -C "${aur_dir}" commit -m "Release ${VERSION}"
          fi

          ssh_command="ssh -i ${HOME}/.ssh/id_aur \
            -o IdentitiesOnly=yes -o ConnectTimeout=30"
          for attempt in 1 2 3; do
            if push_output=$(
              GIT_SSH_COMMAND="${ssh_command}" \
                git -C "${aur_dir}" push origin HEAD:master 2>&1
            ); then
              printf '%s\n' "${push_output}"
              exit 0
            fi

            printf '%s\n' "${push_output}" >&2
            case "${push_output}" in
              *kex_exchange_identification* | \
                *"Connection closed"* | \
                *"Connection reset"* | \
                *"Connection timed out"* | \
                *"Connection refused"* | \
                *"No route to host"*)
                ;;
              *)
                exit 1
                ;;
            esac

            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi

            retry_delay=$((attempt * 15))
            echo "::warning::AUR SSH transport failed (attempt ${attempt}/3); retrying in ${retry_delay}s."
            sleep "${retry_delay}"
          done
